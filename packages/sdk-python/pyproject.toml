[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "confighub-sdk"
version = "0.1.0"
description = "ConfigHub Python SDK for feature flags and remote configuration"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "ConfigHub" }
]
keywords = ["feature-flag", "config", "remote-config", "confighub"]
dependencies = []

[project.optional-dependencies]
dev = [
    "ruff>=0.11.0",
]

[tool.setuptools]
packages = ["confighub_sdk"]
